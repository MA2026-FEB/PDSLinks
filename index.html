<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Findex PDS Index</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23003087'/><text x='6' y='23' font-size='20' font-family='sans-serif' font-weight='700' fill='white'>F</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg2:       #f8f8f6;
    --bg3:       #f2f1ee;
    --border:    rgba(0,0,0,0.10);
    --border2:   rgba(0,0,0,0.18);
    --text:      #1a1a1a;
    --text2:     #5a5a5a;
    --text3:     #909090;
    --accent:    #003087;
    --accent-bg: #e6ecf5;
    --green:     #2d7d46;
    --green-bg:  #e8f5ed;
    --amber:     #8a5200;
    --amber-bg:  #fef3dc;
    --red:       #a12929;
    --red-bg:    #fdeaea;
    --gray:      #5a5a5a;
    --gray-bg:   #f2f1ee;
    --radius:    10px;
    --radius-sm: 6px;
    --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #161616;
      --bg2:       #1e1e1e;
      --bg3:       #252525;
      --border:    rgba(255,255,255,0.10);
      --border2:   rgba(255,255,255,0.18);
      --text:      #f0f0f0;
      --text2:     #aaaaaa;
      --text3:     #666666;
      --accent:    #5b8fd4;
      --accent-bg: #1a2a3d;
      --green:     #4caf72;
      --green-bg:  #0d2b18;
      --amber:     #e0a030;
      --amber-bg:  #2a1e00;
      --red:       #e06060;
      --red-bg:    #2b0d0d;
      --gray:      #aaaaaa;
      --gray-bg:   #2a2a2a;
      --shadow:    0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--accent);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    text-decoration: none;
  }
  .header-logo {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 600; color: white; }
  .header-sub   { font-size: 11px; opacity: 0.7; color: white; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .last-updated { font-size: 11px; color: rgba(255,255,255,0.6); }

  /* ── Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: var(--bg);
    margin-bottom: 1.5rem;
  }
  .upload-zone:hover, .upload-zone.drag { background: var(--accent-bg); border-color: var(--accent); }
  .upload-zone .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .upload-zone h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .upload-zone p  { font-size: 13px; color: var(--text2); }
  .upload-zone code { font-size: 12px; background: var(--bg3); padding: 1px 6px; border-radius: 4px; }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
  }
  .stat-card .num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .stat-card .lbl { font-size: 11px; color: var(--text2); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .tab-btn {
    padding: 6px 16px; border-radius: 99px; font-size: 13px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; transition: all 0.1s;
  }
  .tab-btn.active {
    background: var(--accent); color: white; border-color: var(--accent); font-weight: 500;
  }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-wrap input { width: 100%; padding: 8px 10px 8px 34px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .filter-label { font-size: 11px; color: var(--text3); margin-right: 2px; }
  .filter-btn {
    font-size: 12px; padding: 3px 10px; border-radius: 99px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; transition: all 0.1s;
  }
  .filter-btn.active {
    border-width: 1.5px; border-color: var(--accent);
    background: var(--accent-bg); color: var(--accent); font-weight: 500;
  }
  .filter-sep { width: 0.5px; height: 16px; background: var(--border2); margin: 0 4px; }

  /* ── Results info ── */
  .results-info {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text2); margin-bottom: 8px;
  }

  /* ── Table ── */
  .table-wrap {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); border-bottom: 0.5px solid var(--border2); }
  th {
    padding: 9px 14px; text-align: left; font-size: 11px;
    font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.04em;
    white-space: nowrap;
  }
  td { padding: 10px 14px; vertical-align: middle; }
  tbody tr {
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.has-url { cursor: pointer; }
  tbody tr.has-url:hover { background: var(--bg2); }
  tbody tr.no-url { opacity: 0.6; }

  .fund-name { font-weight: 500; color: var(--text); }
  .mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 11px; color: var(--text2); }
  .muted { font-size: 12px; color: var(--text2); }

  /* ── Pills ── */
  .pill {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 99px; white-space: nowrap;
  }
  .pill-approved { background: var(--green-bg); color: var(--green); }
  .pill-hold     { background: var(--amber-bg); color: var(--amber); }
  .pill-sell     { background: var(--red-bg);   color: var(--red);   }
  .pill-closed   { background: var(--gray-bg);  color: var(--gray);  }
  .pill-apl      { background: var(--accent-bg); color: var(--accent); }
  .pill-direct   { background: var(--green-bg);  color: var(--green);  }
  .pill-centric  { background: #f0eeff;           color: #5340b0;       }
  @media (prefers-color-scheme: dark) {
    .pill-centric { background: #1e1440; color: #a090f0; }
  }

  /* ── Download icon ── */
  .dl-icon { color: var(--accent); font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .dl-none { color: var(--text3); opacity: 0.35; display: flex; align-items: center; justify-content: center; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text2); }
  .empty .icon { font-size: 40px; opacity: 0.3; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: var(--radius-sm);
    font-size: 13px; z-index: 999; white-space: nowrap;
    transition: transform 0.2s ease, opacity 0.2s ease;
    opacity: 0; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Error ── */
  .error-bar {
    background: var(--red-bg); color: var(--red);
    border: 0.5px solid var(--red); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 13px; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Load button ── */
  .load-btn {
    font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: rgba(255,255,255,0.15);
    color: white; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.1s;
  }
  .load-btn:hover { background: rgba(255,255,255,0.25); }

  @media (max-width: 700px) {
    .container { padding: 1rem; }
    .header { padding: 0 1rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    th, td { padding: 8px 10px; }
    .hide-sm { display: none; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">F</div>
    <div>
      <div class="header-title">Findex PDS Index</div>
      <div class="header-sub">Product Disclosure Statements</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated"></span>
    <button class="load-btn" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="load-btn-label">Load index</span>
    </button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileInput(this)">
  </div>
</header>

<div class="container">

  <div id="upload-zone" class="upload-zone"
    onclick="document.getElementById('file-input').click()"
    ondragover="onDragOver(event)"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event)">
    <div class="icon">📄</div>
    <h3>Drop your PDS index file here</h3>
    <p>Upload the <code>pds_index.json</code> exported from the Findex PDS Pipeline tool</p>
    <p style="margin-top:8px;font-size:12px;color:var(--text3)">or click to browse</p>
  </div>

  <div id="error-bar" class="error-bar" style="display:none">
    ⚠️ <span id="error-msg"></span>
  </div>

  <div id="app" style="display:none">

    <div class="stats-bar" id="stats-bar"></div>

    <div class="tabs" id="tabs"></div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search by fund name, APIR or ticker…" oninput="onSearch(this.value)">
      </div>
      <button onclick="clearSearch()" id="clear-btn" style="display:none;font-size:12px;padding:7px 12px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;">Clear</button>
    </div>

    <div class="filter-row" id="filter-row"></div>

    <div class="results-info">
      <span id="results-count"></span>
      <span style="font-size:11px;color:var(--text3)">↓ Click a row to download</span>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allProducts = [];
let allPlatforms = [];
let currentTab = 'products';
let searchQuery = '';
let filters = { status: 'All', source: 'All', asset: 'All' };
let generatedAt = '';

function loadJSON(text) {
  try {
    const data = JSON.parse(text);
    allProducts = Array.isArray(data.products) ? data.products : [];
    allPlatforms = Array.isArray(data.platforms) ? data.platforms : [];
    generatedAt = data.generatedAt || '';
    showError('');
    initApp();
  } catch(e) {
    showError('Could not parse file — make sure it\'s a pds_index.json exported from the PDS Pipeline tool.');
  }
}

function handleFileInput(input) {
  const file = input.files[0];
  if (!file) return;
  readFile(file);
  input.value = '';
}

function readFile(file) {
  const r = new FileReader();
  r.onload = e => loadJSON(e.target.result);
  r.readAsText(file);
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('drag');
}
function onDragLeave(e) {
  document.getElementById('upload-zone').classList.remove('drag');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
}

function initApp() {
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('load-btn-label').textContent = 'Load new index';

  if (generatedAt) {
    document.getElementById('last-updated').textContent = 'Updated ' + generatedAt;
  }

  filters = { status: 'All', source: 'All', asset: 'All' };
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';

  renderStats();
  renderTabs();
  renderFilters();
  renderTable();
}

function renderStats() {
  const withUrl = allProducts.filter(p => p.sharePointUrl || p.arcUrl).length;
  const approved = allProducts.filter(p => p.status === 'Approved').length;
  const withDate = allProducts.filter(p => p.issueDate).length;
  const dl = [
    { num: allProducts.length, lbl: 'Total products' },
    { num: allPlatforms.length, lbl: 'Platform docs' },
    { num: approved, lbl: 'Approved' },
    { num: withUrl, lbl: 'With PDS link' },
    { num: withDate, lbl: 'With issue date' },
  ];
  document.getElementById('stats-bar').innerHTML = dl.map(d =>
    `<div class="stat-card"><div class="num">${d.num}</div><div class="lbl">${d.lbl}</div></div>`
  ).join('');
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = [
    ['products', `Products (${allProducts.length})`],
    ['platforms', `Platform docs (${allPlatforms.length})`]
  ].map(([key, label]) =>
    `<button class="tab-btn ${currentTab===key?'active':''}" onclick="switchTab('${key}')">${label}</button>`
  ).join('');
}

function switchTab(tab) {
  currentTab = tab;
  filters = { status: 'All', source: 'All', asset: 'All' };
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  renderTabs();
  renderFilters();
  renderTable();
}

function getFiltered() {
  const records = currentTab === 'products' ? allProducts : allPlatforms;
  const q = searchQuery.toLowerCase();
  return records.filter(p => {
    const name = (p.fundName || p.platformName || '').toLowerCase();
    const apir = (p.apir || '').toLowerCase();
    const ticker = (p.ticker || '').toLowerCase();
    if (q && !name.includes(q) && !apir.includes(q) && !ticker.includes(q)) return false;
    if (currentTab === 'products') {
      if (filters.status !== 'All' && p.status !== filters.status) return false;
      if (filters.source !== 'All' && p.source !== filters.source) return false;
      if (filters.asset  !== 'All' && p.assetClass !== filters.asset) return false;
    }
    return true;
  });
}

function renderFilters() {
  if (currentTab !== 'products') {
    document.getElementById('filter-row').innerHTML = '';
    return;
  }
  const statuses = ['All', ...unique(allProducts.map(p => p.status).filter(Boolean)).sort()];
  const sources  = ['All', ...unique(allProducts.map(p => p.source).filter(Boolean)).sort()];
  const assets   = ['All', ...unique(allProducts.map(p => p.assetClass).filter(Boolean)).sort()];

  let html = filterGroup('Status', statuses, filters.status, 'status');
  html += '<div class="filter-sep"></div>';
  html += filterGroup('Source', sources, filters.source, 'source');
  if (assets.length > 2) {
    html += '<div class="filter-sep"></div>';
    html += filterGroup('Asset class', assets, filters.asset, 'asset');
  }
  document.getElementById('filter-row').innerHTML = html;
}

function filterGroup(label, values, current, key) {
  return `<span class="filter-label">${label}</span>` +
    values.map(v =>
      `<button class="filter-btn ${v===current?'active':''}" onclick="setFilter('${key}','${v.replace(/'/g,"\\'")}')">${esc(v)}</button>`
    ).join('');
}

function setFilter(key, val) {
  filters[key] = val;
  renderFilters();
  renderTable();
}

function onSearch(val) {
  searchQuery = val;
  document.getElementById('clear-btn').style.display = val ? '' : 'none';
  renderTable();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  renderTable();
}

function renderTable() {
  const filtered = getFiltered();
  const withUrl = filtered.filter(p => p.sharePointUrl || p.arcUrl).length;

  document.getElementById('results-count').textContent =
    `${filtered.length} result${filtered.length !== 1 ? 's' : ''}` +
    (currentTab === 'products' ? ` · ${withUrl} with download link` : '');

  // Head
  if (currentTab === 'products') {
    document.getElementById('table-head').innerHTML = `<tr>
      <th style="width:30%">Fund name</th>
      <th style="width:11%">APIR / Ticker</th>
      <th style="width:10%" class="hide-sm">Issue date</th>
      <th style="width:13%" class="hide-sm">Asset class</th>
      <th style="width:10%">Status</th>
      <th style="width:9%" class="hide-sm">Source</th>
      <th style="width:7%">MDA/SOA</th>
      <th style="width:5%;text-align:center">PDS</th>
    </tr>`;
  } else {
    document.getElementById('table-head').innerHTML = `<tr>
      <th style="width:55%">Platform / document</th>
      <th style="width:20%">Issue date</th>
      <th style="width:10%">Method</th>
      <th style="width:5%;text-align:center">Doc</th>
    </tr>`;
  }

  // Body
  if (filtered.length === 0) {
    const colspan = currentTab === 'products' ? 8 : 4;
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="${colspan}"><div class="empty"><div class="icon">🔍</div><p>No results found</p></div></td></tr>`;
    return;
  }

  document.getElementById('table-body').innerHTML = filtered.map(p => {
    const hasUrl = !!(p.sharePointUrl || p.arcUrl);
    const name = esc(p.fundName || p.platformName || '—');

    if (currentTab === 'products') {
      return `<tr class="${hasUrl ? 'has-url' : 'no-url'}" onclick="${hasUrl ? `downloadPDS(${JSON.stringify(JSON.stringify(p))})` : ''}">
        <td><span class="fund-name">${name}</span></td>
        <td><span class="mono">${esc(p.apir || p.ticker || '—')}</span></td>
        <td class="muted hide-sm">${esc(p.issueDate || '—')}</td>
        <td class="hide-sm" style="font-size:11px;color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(p.assetClass||'')}">${esc(p.assetClass || '—')}</td>
        <td>${statusPill(p.status)}</td>
        <td class="hide-sm">${sourcePill(p.source)}</td>
        <td><span class="mono" style="font-size:11px">${esc(p.mdaSoa||'—')}</span></td>
        <td style="text-align:center">${hasUrl
          ? `<span class="dl-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>`
          : `<span class="dl-none">—</span>`
        }</td>
      </tr>`;
    } else {
      return `<tr class="${hasUrl ? 'has-url' : 'no-url'}" onclick="${hasUrl ? `downloadPDS(${JSON.stringify(JSON.stringify(p))})` : ''}">
        <td><span class="fund-name">${name}</span></td>
        <td class="muted">${esc(p.issueDate || '—')}</td>
        <td><span class="mono">${esc(p.method || '—')}</span></td>
        <td style="text-align:center">${hasUrl
          ? `<span class="dl-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>`
          : `<span class="dl-none">—</span>`
        }</td>
      </tr>`;
    }
  }).join('');
}

function downloadPDS(jsonStr) {
  const p = JSON.parse(jsonStr);
  const url = p.sharePointUrl || p.arcUrl;
  if (!url) return;
  const a = document.createElement('a');
  a.href = url;
  a.download = p.filename || ((p.fundName || p.platformName || 'PDS') + '.pdf');
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('Downloading ' + (p.filename || p.fundName || p.platformName || 'document') + '…');
}

function statusPill(s) {
  if (!s) return '<span style="color:var(--text3);font-size:12px">—</span>';
  const cls = { Approved:'approved', Hold:'hold', Sell:'sell', Closed:'closed' }[s] || 'closed';
  return `<span class="pill pill-${cls}">${esc(s)}</span>`;
}

function sourcePill(s) {
  if (!s) return '';
  const cls = s === 'Direct Listed' ? 'direct' : s === 'Centric One' ? 'centric' : 'apl';
  return `<span class="pill pill-${cls}" style="font-size:10px">${esc(s)}</span>`;
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  if (msg) { document.getElementById('error-msg').textContent = msg; bar.style.display = 'flex'; }
  else bar.style.display = 'none';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function unique(arr) { return [...new Set(arr)]; }
</script>
</body>
